<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Snake Game - Enhanced Edition</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🐍 Snake Game</h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="score-label">Score</span>
                    <span id="score" class="score-value">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">High Score</span>
                    <span id="highScore" class="score-value">0</span>
                </div>
                <div class="score-item" id="timeItem" style="display:none;">
                    <span class="score-label">Time</span>
                    <span id="time" class="score-value">180</span>
                </div>
                <div class="score-item" id="comboItem" style="display:none;">
                    <span class="score-label">Combo</span>
                    <span id="combo" class="score-value">x1</span>
                </div>
            </div>
        </header>

        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div id="startScreen" class="overlay">
                <div class="overlay-content">
                    <h2>🐍 Snake Game</h2>
                    
                    <div class="game-settings">
                        <div class="setting-group">
                            <label for="gameMode">Game Mode:</label>
                            <select id="gameMode">
                                <option value="classic">Classic</option>
                                <option value="timed">Timed (3 min)</option>
                                <option value="survival">Survival</option>
                            </select>
                        </div>
                        
                        <div class="setting-group">
                            <label for="difficulty">Difficulty:</label>
                            <select id="difficulty">
                                <option value="1">Easy</option>
                                <option value="2" selected>Medium</option>
                                <option value="3">Hard</option>
                            </select>
                        </div>
                    </div>
                    
                    <p class="powerup-info">
                        <span style="color: #f59e0b">⚡ Speed Boost</span> |
                        <span style="color: #3b82f6">❄️ Slow Motion</span> |
                        <span style="color: #8b5cf6">💎 2x Points</span> |
                        <span style="color: #ec4899">👻 Ghost Mode</span>
                    </p>
                    
                    <button id="startBtn" class="btn btn-primary">Start Game</button>
                    <button id="leaderboardBtn" class="btn btn-secondary">🏆 Leaderboard</button>
                </div>
            </div>

            <div id="gameOverScreen" class="overlay hidden">
                <div class="overlay-content">
                    <h2>💀 Game Over!</h2>
                    <p>Your Score: <span id="finalScore">0</span></p>
                    <p id="newHighScore" style="color: #f59e0b; display: none;">🎉 New High Score!</p>
                    <button id="restartBtn" class="btn btn-primary">Play Again</button>
                    <button id="menuBtn" class="btn btn-secondary">Main Menu</button>
                </div>
            </div>

            <div id="pauseScreen" class="overlay hidden">
                <div class="overlay-content">
                    <h2>⏸️ Paused</h2>
                    <p>Press SPACE or P to resume</p>
                </div>
            </div>

            <div id="leaderboardScreen" class="overlay hidden">
                <div class="overlay-content">
                    <h2>🏆 Leaderboard</h2>
                    <div id="leaderboardContent" class="leaderboard"></div>
                    <button id="closeLeaderboardBtn" class="btn btn-secondary">Close</button>
                </div>
            </div>
        </div>

        <div class="powerup-indicators" id="powerupIndicators"></div>

        <div class="controls">
            <div class="control-info">
                <span class="key">↑</span>
                <span class="key">↓</span>
                <span class="key">←</span>
                <span class="key">→</span>
                <span class="key-label">or WASD</span>
            </div>
            <div class="control-info">
                <span class="key">SPACE</span>
                <span class="key-label">Pause</span>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div class="mobile-controls">
            <button id="upBtn" class="mobile-btn">▲</button>
            <div class="mobile-row">
                <button id="leftBtn" class="mobile-btn">◀</button>
                <button id="downBtn" class="mobile-btn">▼</button>
                <button id="rightBtn" class="mobile-btn">▶</button>
            </div>
        </div>

        <footer class="game-footer">
            <p>Built with ❤️ by username9999</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
