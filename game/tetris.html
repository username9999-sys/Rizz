<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Tetris - Rizz Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .game-container {
            display: flex;
            gap: 30px;
            padding: 20px;
        }
        canvas {
            border: 3px solid #334155;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
        }
        .sidebar {
            min-width: 200px;
        }
        .stat-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #10b981;
        }
        .controls {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #334155;
        }
        .controls h3 {
            margin-bottom: 15px;
            color: #10b981;
        }
        .key {
            display: inline-block;
            background: #334155;
            padding: 5px 10px;
            border-radius: 5px;
            margin: 3px;
            font-size: 0.8rem;
        }
        .btn {
            background: linear-gradient(135deg, #10b981, #3b82f6);
            border: none;
            padding: 15px 30px;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }
        h1 {
            position: fixed;
            top: 20px;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #10b981, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <h1>🎮 Tetris</h1>
    <div class="game-container">
        <canvas id="gameCanvas" width="300" height="600"></canvas>
        <div class="sidebar">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Lines</div>
                <div class="stat-value" id="lines">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Next</div>
                <canvas id="nextCanvas" width="100" height="100" style="margin-top: 10px; border: none; box-shadow: none;"></canvas>
            </div>
            <div class="controls">
                <h3>Controls</h3>
                <div><span class="key">←</span> <span class="key">→</span> Move</div>
                <div><span class="key">↑</span> Rotate</div>
                <div><span class="key">↓</span> Soft Drop</div>
                <div><span class="key">Space</span> Hard Drop</div>
                <div><span class="key">P</span> Pause</div>
                <button class="btn" onclick="startGame()">New Game</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        const NEXT_BLOCK_SIZE = 25;
        
        const COLORS = [
            null,
            '#ef4444', // Z - Red
            '#3b82f6', // J - Blue
            '#f59e0b', // L - Orange
            '#10b981', // S - Green
            '#8b5cf6', // T - Purple
            '#06b6d4', // I - Cyan
            '#eab308', // O - Yellow
        ];
        
        const SHAPES = [
            null,
            [[1, 1, 0], [0, 1, 1], [0, 0, 0]], // Z
            [[0, 2, 0], [2, 2, 2], [0, 0, 0]], // J
            [[0, 3, 0], [3, 3, 3], [0, 0, 0]], // L
            [[0, 4, 4], [4, 4, 0], [0, 0, 0]], // S
            [[0, 5, 0], [5, 5, 5], [0, 0, 0]], // T
            [[0, 6, 0, 0], [0, 6, 0, 0], [0, 6, 0, 0], [0, 6, 0, 0]], // I
            [[7, 7], [7, 7]], // O
        ];
        
        let board = [];
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameOver = false;
        let paused = false;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        
        let player = {
            pos: { x: 0, y: 0 },
            matrix: null,
            score: 0,
        };
        
        let nextPiece = null;
        
        function createPiece() {
            const pieces = '1234567';
            const rand = pieces[Math.floor(Math.random() * pieces.length)];
            return SHAPES[parseInt(rand)];
        }
        
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }
        
        function draw() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawMatrix(board, { x: 0, y: 0 });
            drawMatrix(player.matrix, player.pos);
        }
        
        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        const gradient = ctx.createLinearGradient(
                            (x + offset.x) * BLOCK_SIZE,
                            (y + offset.y) * BLOCK_SIZE,
                            (x + offset.x + 1) * BLOCK_SIZE,
                            (y + offset.y + 1) * BLOCK_SIZE
                        );
                        gradient.addColorStop(0, COLORS[value]);
                        gradient.addColorStop(1, shadeColor(COLORS[value], -20));
                        
                        ctx.fillStyle = gradient;
                        ctx.fillRect(
                            (x + offset.x) * BLOCK_SIZE + 1,
                            (y + offset.y) * BLOCK_SIZE + 1,
                            BLOCK_SIZE - 2,
                            BLOCK_SIZE - 2
                        );
                        
                        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                        ctx.strokeRect(
                            (x + offset.x) * BLOCK_SIZE + 1,
                            (y + offset.y) * BLOCK_SIZE + 1,
                            BLOCK_SIZE - 2,
                            BLOCK_SIZE - 2
                        );
                    }
                });
            });
        }
        
        function drawNext() {
            nextCtx.fillStyle = '#1e293b';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (!nextPiece) return;
            
            const offsetX = (nextCanvas.width / NEXT_BLOCK_SIZE - nextPiece[0].length) / 2;
            const offsetY = (nextCanvas.height / NEXT_BLOCK_SIZE - nextPiece.length) / 2;
            
            nextPiece.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        nextCtx.fillStyle = COLORS[value];
                        nextCtx.fillRect(
                            (x + offsetX) * NEXT_BLOCK_SIZE + 1,
                            (y + offsetY) * NEXT_BLOCK_SIZE + 1,
                            NEXT_BLOCK_SIZE - 2,
                            NEXT_BLOCK_SIZE - 2
                        );
                    }
                });
            });
        }
        
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }
        
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }
        
        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(board, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }
        
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                        (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }
        
        function playerReset() {
            if (!nextPiece) nextPiece = createPiece();
            player.matrix = nextPiece;
            nextPiece = createPiece();
            drawNext();
            
            player.pos.y = 0;
            player.pos.x = (board[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(board, player)) {
                gameOver = true;
                document.getElementById('score').textContent = score;
            }
        }
        
        function arenaSweep() {
            let rowCount = 0;
            outer: for (let y = board.length - 1; y > 0; --y) {
                for (let x = 0; x < board[y].length; ++x) {
                    if (board[y][x] === 0) continue outer;
                }
                
                const row = board.splice(y, 1)[0].fill(0);
                board.unshift(row);
                ++y;
                rowCount++;
            }
            
            if (rowCount > 0) {
                const lineScores = [0, 100, 300, 500, 800];
                score += lineScores[rowCount] * level;
                lines += rowCount;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                
                updateScore();
            }
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }
        
        function playerDrop() {
            player.pos.y++;
            if (collide(board, player)) {
                player.pos.y--;
                merge(board, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }
        
        function playerHardDrop() {
            while (!collide(board, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(board, player);
            playerReset();
            arenaSweep();
            dropCounter = 0;
        }
        
        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(board, player)) {
                player.pos.x -= dir;
            }
        }
        
        function update(time = 0) {
            if (gameOver || paused) return;
            
            const deltaTime = time - lastTime;
            lastTime = time;
            
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            
            draw();
            requestAnimationFrame(update);
        }
        
        function startGame() {
            board = createMatrix(COLS, ROWS);
            score = 0;
            level = 1;
            lines = 0;
            gameOver = false;
            paused = false;
            dropInterval = 1000;
            nextPiece = null;
            
            updateScore();
            playerReset();
            update();
        }
        
        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 + 
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 + 
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 + 
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }
        
        document.addEventListener('keydown', event => {
            if (gameOver) return;
            
            if (event.keyCode === 80) { // P
                paused = !paused;
                if (!paused) update();
                return;
            }
            
            if (paused) return;
            
            if (event.keyCode === 37) playerMove(-1); // Left
            else if (event.keyCode === 39) playerMove(1); // Right
            else if (event.keyCode === 40) playerDrop(); // Down
            else if (event.keyCode === 38) playerRotate(1); // Up - Rotate
            else if (event.keyCode === 32) { // Space
                event.preventDefault();
                playerHardDrop();
            }
        });
        
        startGame();
    </script>
</body>
</html>
