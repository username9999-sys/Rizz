<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Rizz Arcade - Enhanced Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #10b981, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .game-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .game-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .game-btn.snake { background: linear-gradient(135deg, #10b981, #3b82f6); color: white; }
        .game-btn.tetris { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; }
        .game-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .game-container {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        canvas {
            border: 3px solid #334155;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
        }
        .stats {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            justify-content: center;
        }
        .stat-box {
            background: #334155;
            padding: 15px 30px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-label { font-size: 0.9rem; color: #94a3b8; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #10b981; }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .control-btn {
            padding: 10px 20px;
            background: #334155;
            border: none;
            border-radius: 8px;
            color: #f1f5f9;
            cursor: pointer;
            font-size: 1rem;
        }
        .control-btn:hover { background: #475569; }
    </style>
</head>
<body>
    <h1>🎮 Rizz Arcade</h1>
    
    <div class="game-selector">
        <button class="game-btn snake" onclick="switchGame('snake')">🐍 Snake</button>
        <button class="game-btn tetris" onclick="switchGame('tetris')">🧱 Tetris</button>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">High Score</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="control-btn" onclick="startGame()">▶️ Start</button>
            <button class="control-btn" onclick="pauseGame()">⏸️ Pause</button>
            <button class="control-btn" onclick="resetGame()">🔄 Reset</button>
        </div>
    </div>

    <script>
        // ===== GAME STATE =====
        let currentGame = 'snake';
        let gameLoop = null;
        let isPaused = false;
        let score = 0;
        let highScore = localStorage.getItem('arcadeHighScore') || 0;
        let level = 1;

        // ===== SNAKE GAME =====
        const snakeGame = {
            canvas: null,
            ctx: null,
            snake: [],
            food: {},
            direction: 'right',
            nextDirection: 'right',
            speed: 150,
            
            init() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.reset();
                this.draw();
            },
            
            reset() {
                this.snake = [{x: 5, y: 10}, {x: 4, y: 10}, {x: 3, y: 10}];
                this.food = this.spawnFood();
                this.direction = 'right';
                this.nextDirection = 'right';
                score = 0;
                level = 1;
                this.updateStats();
            },
            
            spawnFood() {
                let food;
                do {
                    food = {
                        x: Math.floor(Math.random() * 20),
                        y: Math.floor(Math.random() * 20)
                    };
                } while (this.snake.some(s => s.x === food.x && s.y === food.y));
                return food;
            },
            
            update() {
                this.direction = this.nextDirection;
                const head = {...this.snake[0]};
                
                switch(this.direction) {
                    case 'up': head.y -= 1; break;
                    case 'down': head.y += 1; break;
                    case 'left': head.x -= 1; break;
                    case 'right': head.x += 1; break;
                }
                
                // Wall collision
                if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) {
                    this.gameOver();
                    return;
                }
                
                // Self collision
                if (this.snake.some(s => s.x === head.x && s.y === head.y)) {
                    this.gameOver();
                    return;
                }
                
                this.snake.unshift(head);
                
                // Food collision
                if (head.x === this.food.x && head.y === this.food.y) {
                    score += 10 * level;
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('arcadeHighScore', highScore);
                    }
                    this.food = this.spawnFood();
                    this.updateStats();
                    
                    // Level up every 50 points
                    if (score >= level * 50) {
                        level++;
                        this.speed = Math.max(50, this.speed - 20);
                        clearInterval(gameLoop);
                        gameLoop = setInterval(() => this.update(), this.speed);
                    }
                } else {
                    this.snake.pop();
                }
                
                this.draw();
            },
            
            draw() {
                // Clear
                this.ctx.fillStyle = '#0f172a';
                this.ctx.fillRect(0, 0, 400, 400);
                
                // Grid
                this.ctx.strokeStyle = 'rgba(51, 65, 85, 0.3)';
                for (let i = 0; i <= 20; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * 20, 0);
                    this.ctx.lineTo(i * 20, 400);
                    this.ctx.stroke();
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * 20);
                    this.ctx.lineTo(400, i * 20);
                    this.ctx.stroke();
                }
                
                // Snake
                this.snake.forEach((segment, i) => {
                    const gradient = this.ctx.createRadialGradient(
                        segment.x * 20 + 10, segment.y * 20 + 10, 0,
                        segment.x * 20 + 10, segment.y * 20 + 10, 10
                    );
                    gradient.addColorStop(0, i === 0 ? '#34d399' : '#10b981');
                    gradient.addColorStop(1, '#059669');
                    
                    this.ctx.fillStyle = gradient;
                    this.ctx.fillRect(segment.x * 20 + 1, segment.y * 20 + 1, 18, 18);
                });
                
                // Food
                this.ctx.fillStyle = '#ef4444';
                this.ctx.beginPath();
                this.ctx.arc(
                    this.food.x * 20 + 10,
                    this.food.y * 20 + 10,
                    8, 0, Math.PI * 2
                );
                this.ctx.fill();
            },
            
            updateStats() {
                document.getElementById('score').textContent = score;
                document.getElementById('highScore').textContent = highScore;
                document.getElementById('level').textContent = level;
            },
            
            gameOver() {
                clearInterval(gameLoop);
                alert(`Game Over! Score: ${score}`);
            }
        };

        // ===== TETRIS GAME =====
        const tetrisGame = {
            canvas: null,
            ctx: null,
            board: [],
            currentPiece: null,
            nextPiece: null,
            
            SHAPES: [
                [[1, 1, 1, 1]], // I
                [[1, 1], [1, 1]], // O
                [[0, 1, 0], [1, 1, 1]], // T
                [[1, 0, 0], [1, 1, 1]], // L
                [[0, 0, 1], [1, 1, 1]], // J
                [[0, 1, 1], [1, 1, 0]], // S
                [[1, 1, 0], [0, 1, 1]]  // Z
            ],
            
            COLORS: ['#06b6d4', '#eab308', '#8b5cf6', '#f97316', '#3b82f6', '#10b981', '#ef4444'],
            
            init() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.reset();
            },
            
            reset() {
                this.board = Array(20).fill().map(() => Array(10).fill(0));
                this.currentPiece = this.randomPiece();
                this.nextPiece = this.randomPiece();
                score = 0;
                level = 1;
                this.updateStats();
            },
            
            randomPiece() {
                const index = Math.floor(Math.random() * this.SHAPES.length);
                return {
                    shape: this.SHAPES[index],
                    color: this.COLORS[index],
                    x: 3,
                    y: 0
                };
            },
            
            update() {
                this.currentPiece.y++;
                
                if (this.collision()) {
                    this.currentPiece.y--;
                    this.merge();
                    this.clearLines();
                    this.currentPiece = this.nextPiece;
                    this.nextPiece = this.randomPiece();
                    
                    if (this.collision()) {
                        this.gameOver();
                    }
                }
                
                this.draw();
            },
            
            collision() {
                for (let y = 0; y < this.currentPiece.shape.length; y++) {
                    for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                        if (this.currentPiece.shape[y][x]) {
                            const newX = this.currentPiece.x + x;
                            const newY = this.currentPiece.y + y;
                            
                            if (newX < 0 || newX >= 10 || newY >= 20 ||
                                (newY >= 0 && this.board[newY][newX])) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            },
            
            merge() {
                for (let y = 0; y < this.currentPiece.shape.length; y++) {
                    for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                        if (this.currentPiece.shape[y][x]) {
                            if (this.currentPiece.y + y >= 0) {
                                this.board[this.currentPiece.y + y][this.currentPiece.x + x] = 
                                    this.currentPiece.color;
                            }
                        }
                    }
                }
            },
            
            clearLines() {
                let lines = 0;
                for (let y = 19; y >= 0; y--) {
                    if (this.board[y].every(cell => cell !== 0)) {
                        this.board.splice(y, 1);
                        this.board.unshift(Array(10).fill(0));
                        lines++;
                        y++;
                    }
                }
                
                if (lines > 0) {
                    const points = [0, 100, 300, 500, 800];
                    score += points[lines] * level;
                    if (score >= level * 1000) {
                        level++;
                    }
                    this.updateStats();
                }
            },
            
            draw() {
                this.ctx.fillStyle = '#0f172a';
                this.ctx.fillRect(0, 0, 400, 400);
                
                // Board
                for (let y = 0; y < 20; y++) {
                    for (let x = 0; x < 10; x++) {
                        if (this.board[y][x]) {
                            this.drawBlock(x, y, this.board[y][x]);
                        }
                    }
                }
                
                // Current piece
                if (this.currentPiece) {
                    for (let y = 0; y < this.currentPiece.shape.length; y++) {
                        for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                            if (this.currentPiece.shape[y][x]) {
                                this.drawBlock(
                                    this.currentPiece.x + x,
                                    this.currentPiece.y + y,
                                    this.currentPiece.color
                                );
                            }
                        }
                    }
                }
            },
            
            drawBlock(x, y, color) {
                this.ctx.fillStyle = color;
                this.ctx.fillRect(x * 40 + 1, y * 40 + 1, 38, 38);
                this.ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                this.ctx.strokeRect(x * 40 + 1, y * 40 + 1, 38, 38);
            },
            
            updateStats() {
                document.getElementById('score').textContent = score;
                document.getElementById('highScore').textContent = 
                    Math.max(score, highScore);
                document.getElementById('level').textContent = level;
            },
            
            gameOver() {
                clearInterval(gameLoop);
                alert(`Game Over! Score: ${score}`);
            }
        };

        // ===== GAME CONTROL =====
        function switchGame(game) {
            currentGame = game;
            clearInterval(gameLoop);
            isPaused = false;
            
            if (game === 'snake') {
                snakeGame.init();
            } else {
                tetrisGame.init();
            }
        }

        function startGame() {
            if (gameLoop) return;
            
            if (currentGame === 'snake') {
                gameLoop = setInterval(() => snakeGame.update(), snakeGame.speed);
            } else {
                gameLoop = setInterval(() => tetrisGame.update(), 1000 - (level - 1) * 100);
            }
        }

        function pauseGame() {
            if (!gameLoop) return;
            
            if (isPaused) {
                startGame();
                isPaused = false;
            } else {
                clearInterval(gameLoop);
                gameLoop = null;
                isPaused = true;
            }
        }

        function resetGame() {
            clearInterval(gameLoop);
            gameLoop = null;
            isPaused = false;
            switchGame(currentGame);
        }

        // ===== CONTROLS =====
        document.addEventListener('keydown', (e) => {
            if (currentGame === 'snake') {
                switch(e.key) {
                    case 'ArrowUp': snakeGame.nextDirection = 'up'; break;
                    case 'ArrowDown': snakeGame.nextDirection = 'down'; break;
                    case 'ArrowLeft': snakeGame.nextDirection = 'left'; break;
                    case 'ArrowRight': snakeGame.nextDirection = 'right'; break;
                }
            } else {
                switch(e.key) {
                    case 'ArrowLeft': tetrisGame.currentPiece.x--; break;
                    case 'ArrowRight': tetrisGame.currentPiece.x++; break;
                    case 'ArrowDown': tetrisGame.currentPiece.y++; break;
                    case 'ArrowUp': 
                        const shape = tetrisGame.currentPiece.shape;
                        const rotated = shape[0].map((_, i) => shape.map(row => row[i]).reverse());
                        tetrisGame.currentPiece.shape = rotated;
                        break;
                }
            }
        });

        // Initialize
        snakeGame.init();
    </script>
</body>
</html>
