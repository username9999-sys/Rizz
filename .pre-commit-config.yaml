repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
        args: [--unsafe]
    -   id: check-json
    -   id: check-added-large-files
        args: ['--maxkb=1024']
    -   id: detect-private-key
    -   id: check-merge-conflict

-   repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
    -   id: black
        language_version: python3.11
        files: ^api-server/.*\.py$

-   repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
    -   id: isort
        name: isort (python)
        files: ^api-server/.*\.py$

-   repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
    -   id: flake8
        files: ^api-server/.*\.py$

-   repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.55.0
    hooks:
    -   id: eslint
        files: \.(js|jsx)$
        types: [file]
        additional_dependencies:
        - eslint@8.55.0

-   repo: local
    hooks:
    -   id: pytest-check
        name: pytest-check
        entry: pytest api-server/tests/ -v --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
