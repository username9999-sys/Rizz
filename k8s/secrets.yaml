---
# Secrets for API Server (use external secrets manager in production!)
apiVersion: v1
kind: Secret
metadata:
  name: rizz-api-secret
  namespace: rizz-platform
type: Opaque
stringData:
  SECRET_KEY: "change-me-to-secure-random-string"
  JWT_SECRET_KEY: "change-me-to-secure-random-string"
  DATABASE_URL: "postgresql://rizz_user:CHANGE_ME@postgres:5432/rizz_api"
  REDIS_URL: "redis://redis:6379/0"
