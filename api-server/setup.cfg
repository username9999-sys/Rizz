[flake8]
max-line-length = 127
max-complexity = 10
exclude = 
    .git,
    __pycache__,
    build,
    dist,
    *.egg-info,
    venv,
    .venv,
    migrations/
extend-select = 
    E9,
    F63,
    F7,
    F82
per-file-ignores =
    __init__.py:F401

[black]
line-length = 127
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | migrations
)/
'''

[isort]
profile = black
line_length = 127
skip = migrations,venv,.venv,__pycache__
known_first_party = app
known_third_party = flask,sqlalchemy,redis

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
exclude = migrations/
