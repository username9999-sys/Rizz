# Default values for rizz-platform
# This is a YAML-formatted file.

# Global settings
global:
  registry: ghcr.io
  imagePullPolicy: Always
  environment: production

# API Server configuration
api:
  replicaCount: 3
  image:
    repository: api-server
    tag: latest
  service:
    type: ClusterIP
    port: 5000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  secrets:
    secretKey: "change-me-to-secure-random-string"
    jwtSecretKey: "change-me-to-secure-random-string"
  config:
    logLevel: INFO
    postsPerPage: 20
    corsOrigins: "*"

# PostgreSQL configuration
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: 15-alpine
  auth:
    username: rizz_user
    password: "change-me-in-production"
    database: rizz_api
  persistence:
    enabled: true
    size: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

# Redis configuration
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: api.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: rizz-api-tls
      hosts:
        - api.yourdomain.com

# Monitoring configuration
monitoring:
  enabled: true
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

# Network policies
networkPolicies:
  enabled: true

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2
